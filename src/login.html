<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — CampusEnergy</title>

<link rel="stylesheet" href="shared/styles.css">

<style>
.auth-wrap{
    min-height:calc(100vh - 78px);
    display:grid;
    place-items:center;
    padding:40px 20px 70px;
}

.auth-card{
    width:100%;
    max-width:440px;
    padding:44px 40px 36px;
    text-align:center;
}

.auth-card h1{
    font-size:1.5rem;
    letter-spacing:.04em;
    margin-bottom:30px;
}

.auth-foot{
    margin-top:22px;
    font-size:.9rem;
    color:var(--text-dim);
}

.auth-foot a{
    color:var(--mint);
    font-weight:600;
}

.auth-foot a:hover{
    text-decoration:underline;
}
</style>

</head>

<body>

<a href="#main" class="skip-link">
    Skip to content
</a>

<div id="site-topbar"></div>

<main id="main" class="page-enter">

<div class="auth-wrap">

<form id="loginForm">

<div class="field" id="usernameField">
    <input
        id="username"
        type="text"
        placeholder="Username"
    >
    <p class="field-error"></p>
</div>

<div class="field" id="passwordField">
    <input
        id="password"
        type="password"
    >
    <p class="field-error"></p>
</div>

<button id="submitBtn">
    Login
</button>

</form>

</div>

</main>

<div id="site-footer"></div>

<script src="shared/api.js"></script>
<script src="shared/app.js"></script>

<script>

CE.initAll({
    topbar:{}
});

const form=document.getElementById("loginForm");
const submitBtn=document.getElementById("submitBtn");

form.addEventListener("submit",async(e)=>{

    e.preventDefault();

    const usernameField=document.getElementById("usernameField");
    const passwordField=document.getElementById("passwordField");

    const username=document.getElementById("username").value.trim();
    const password=document.getElementById("password").value;

    const usernameOk=username.length>0;
    const passwordOk=password.length>0;

    CE.validateField(
        usernameField,
        usernameOk,
        "Username is required."
    );

    CE.validateField(
        passwordField,
        passwordOk,
        "Password is required."
    );

    if(!usernameOk || !passwordOk){
        return;
    }

    CE.setButtonLoading(submitBtn,true);

    try{

        await CampusEnergyAPI.login(
            username,
            password
        );

        CE.toast(
            "Signed in successfully!",
            "success"
        );

        setTimeout(()=>{
            window.location.href="profile.html";
        },700);

    }

    catch(err){

        CE.toast(
            err.message || "Login failed.",
            "error"
        );

        CE.validateField(
            passwordField,
            false,
            err.message || "Invalid username or password."
        );

    }

    finally{

        CE.setButtonLoading(
            submitBtn,
            false
        );

    }

});

</script>

</body>
</html>
