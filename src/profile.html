<html lang="en">

<head>

<title>My Profile</title>

<style>

.profile{
    max-width:900px;
    margin:auto;
    padding:40px;
}

.profile-card{

}

    margin-bottom:15px;
}

Posts:

<button
class="btn btn-primary"
id="logoutBtn">

Logout

</button>

</div>

<div id="posts">

Loading posts...

</div>

</main>

<div id="site-footer"></div>
