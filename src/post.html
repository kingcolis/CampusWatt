<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — CampusEnergy</title>
<link rel="stylesheet" href="shared/styles.css">
<link rel="icon" type="image/png" href="shared/favicon.png">
<style>
  .post-grid{ display:grid; grid-template-columns: 280px 1fr; gap:40px; padding: 40px 0 90px; }
  .meta-panel{ display:flex; flex-direction:column; gap:26px; }
  .meta-panel .label{ font-size:0.92rem; color:var(--mint); font-weight:600; margin-bottom:6px; }
  .meta-panel .value{ font-size:1.05rem; }
  .meta-panel .author-link{ text-decoration:underline; cursor:pointer; }
  .chart-title{ font-size:1.15rem; margin-bottom:18px; }
  .chart-panel{ padding:26px 30px 18px; }
  .insight-box{ margin-top:20px; padding:22px 26px; font-size:0.96rem; }
  .chart-skel{ height:340px; border-radius:16px; }
  .axis-label{ font-family: var(--f-mono); fill: var(--text-faint); font-size: 11px; }
  .grid-line{ stroke: var(--line); stroke-width:1; }
  .data-num{ font-family: var(--f-mono); font-weight:700; fill: var(--text); font-size:13px; }
  .data-pct{ font-family: var(--f-mono); fill: var(--text-faint); font-size:10.5px; }
  .point{ fill: var(--mint); }
  .point-ring{ fill: none; stroke: var(--mint); stroke-width:1.5; opacity:0; }
  @media (max-width:880px){ .post-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div id="site-topbar"></div>

<main id="main" class="page-enter">
  <div class="shell post-grid" id="postContent">
    <div class="skel" style="height:220px; border-radius:18px;"></div>
    <div class="skel chart-skel"></div>
  </div>
</main>

<div id="site-footer"></div>

<script src="shared/api.js"></script>
<script src="shared/app.js"></script>

<script>

CE.initAll({
    topbar: {},
    onReady: loadPost
});

async function loadPost() {

    const params = new URLSearchParams(window.location.search);
    const postId = params.get("id");

    if (!postId) {
        CE.toast("Invalid post.", "error");
        return;
    }

    try {

        const post = await CampusEnergyAPI.getPost(postId);

        document.getElementById("title").textContent =
            post.title;

        document.getElementById("author").textContent =
            post.username;

        document.getElementById("content").textContent =
            post.content;

        document.getElementById("likes").textContent =
            post.likes ?? 0;

        loadComments(postId);

    }

    catch {

        CE.toast("Could not load post.", "error");

    }

}

async function loadComments(postId) {

    try {

        const comments =
            await CampusEnergyAPI.getComments(postId);

        const container =
            document.getElementById("comments");

        if (!comments.length) {

            container.innerHTML =
                "<p>No comments yet.</p>";

            return;

        }

        container.innerHTML = comments.map(c => `

            <div class="panel" style="margin-bottom:12px">

                <strong>${c.username}</strong>

                <p>${c.comment}</p>

            </div>

        `).join("");

    }

    catch {

        CE.toast("Couldn't load comments.", "error");

    }

}

async function likePost() {

    const postId =
        new URLSearchParams(location.search).get("id");

    try {

        await CampusEnergyAPI.likePost(postId);

        loadPost();

    }

    catch {

        CE.toast("Couldn't like post.", "error");

    }

}

async function submitComment() {

    const postId =
        new URLSearchParams(location.search).get("id");

    const textbox =
        document.getElementById("commentText");

    const comment =
        textbox.value.trim();

    if (!comment)
        return;

    try {

        await CampusEnergyAPI.createComment(
            postId,
            comment
        );

        textbox.value = "";

        loadComments(postId);

    }

    catch {

        CE.toast("Couldn't post comment.", "error");

    }

}

</script>

<h1 id="title"></h1>

<p id="author"></p>

<p id="content"></p>

<button onclick="likePost()">
    ❤️ Like
</button>

<span id="likes">0</span>

<hr>

<h3>Comments</h3>

<div id="comments"></div>

<textarea
id="commentText"
placeholder="Write a comment...">
</textarea>

<button onclick="submitComment()">
Post Comment
</button>
</body>
</html>
