<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Create Account • CampusEnergy</title>

<link rel="stylesheet" href="shared/styles.css">

<style>

.auth-wrap{
    min-height:calc(100vh - 80px);
    display:grid;
    place-items:center;
    padding:50px 20px;
}

.auth-card{
    width:100%;
    max-width:520px;
    padding:42px;
}

.auth-card h1{
    text-align:center;
    margin-bottom:32px;
}

.auth-foot{
    margin-top:20px;
    text-align:center;
    color:var(--text-dim);
}

.auth-foot a{
    color:var(--mint);
    font-weight:600;
}

</style>

</head>

<body>

<div id="site-topbar"></div>

<main class="auth-wrap">

<form
id="signupForm"
class="panel auth-card reveal is-visible"
novalidate>

<h1>Create Account</h1>

<div
class="field"
id="usernameField">

<label>
Username
</label>

<div class="field-wrap">

<input

id="username"
type="text"
autocomplete="username"
placeholder="Username"
required>

</div>

<p class="field-error">
Username required.
</p>

</div>

<div
class="field"
id="emailField">

<label>
Email
</label>

<div class="field-wrap">

<input

id="email"
type="email"
autocomplete="email"
placeholder="Email Address"
required>

</div>

<p class="field-error">
Enter a valid email.
</p>

</div>

<div
class="field"
id="passwordField">

<label>
Password
</label>

<div class="field-wrap">

<input

id="password"
type="password"
autocomplete="new-password"
placeholder="Password"
required>

</div>

<p class="field-error">
Minimum 8 characters.
</p>

</div>

<div
class="field"
id="confirmField">

<label>
Confirm Password
</label>

<div class="field-wrap">

<input

id="confirmPassword"
type="password"
autocomplete="new-password"
placeholder="Confirm Password"
required>

</div>

<p class="field-error">
Passwords do not match.
</p>

</div>

<button
id="submitBtn"
class="btn btn-primary btn-block">

<span class="btn-label">

Create Account

</span>

<span class="spinner"></span>

</button>

<p class="auth-foot">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</form>

</main>

<div id="site-footer"></div>

<script src="shared/api.js"></script>
<script src="shared/app.js"></script>
<script src="shared/signup.js"></script>

</body>

</html>
