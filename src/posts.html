<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posts — CampusEnergy</title>
<link rel="stylesheet" href="shared/styles.css">
<link rel="icon" type="image/png" href="shared/favicon.png">
<style>
  .app-grid{ display:grid; grid-template-columns: 220px 1fr; gap:32px; padding: 40px 0 80px; }
  .main-content{ display:flex; flex-direction:column; gap:32px; }
  .post-row{
    display:flex; justify-content:space-between; align-items:center; gap:20px;
    padding: 24px 28px; margin-bottom:18px; cursor:pointer;
  }
  .post-row h3{ font-size:1.08rem; margin-bottom:6px; }
  .post-row .meta{ font-size:0.82rem; color:var(--text-faint); font-family:var(--f-mono); }
  .post-row .arrow{ color:var(--text-faint); transition: transform var(--t-fast) var(--ease), color var(--t-fast) var(--ease); }
  .post-row:hover .arrow{ transform: translateX(4px); color:var(--mint); }
  .post-skel{ height:90px; border-radius:18px; margin-bottom:18px; }
  
  /* Styled composer elements */
  .composer { padding: 32px; }
  .composer h2 { margin-bottom: 24px; font-size: 1.4rem; }
  .composer input, .composer textarea, .composer select {
    background: var(--bg-input);
    border: 1.5px solid rgba(255, 255, 255, 0.05);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 14px 16px;
    width: 100%;
    font-size: 0.96rem;
    margin-bottom: 18px;
    transition: all var(--t-fast) var(--ease);
  }
  .composer input:focus, .composer textarea:focus, .composer select:focus {
    border-color: var(--mint);
    background: var(--bg-panel-2);
    box-shadow: 0 0 0 4px var(--mint-soft);
    outline: none;
  }
  .composer textarea { resize: vertical; min-height: 120px; }
  .composer select {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path fill='%2394a3b8' d='M7 10l5 5 5-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 40px;
  }
  
  /* Search input */
  .search-panel { padding: 20px 24px; }
  .search-panel input {
    background: var(--bg-input);
    border: 1.5px solid rgba(255, 255, 255, 0.05);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 14px 16px;
    width: 100%;
    font-size: 0.96rem;
    transition: all var(--t-fast) var(--ease);
  }
  .search-panel input:focus {
    border-color: var(--mint);
    background: var(--bg-panel-2);
    box-shadow: 0 0 0 4px var(--mint-soft);
    outline: none;
  }

  .delete-btn {
    background: rgba(244, 63, 94, 0.1);
    color: var(--danger);
    border: 1px solid rgba(244, 63, 94, 0.2);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--t-fast) var(--ease);
  }
  .delete-btn:hover {
    background: var(--danger);
    color: #fff;
    border-color: var(--danger);
    box-shadow: 0 4px 12px rgba(244, 63, 94, 0.25);
  }
  
  @media (max-width:880px){ .app-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div id="site-topbar"></div>

<main id="main" class="page-enter">
  <div class="shell app-grid">
    <aside class="sidebar reveal is-visible">
      <a href="profile.html"><div class="side-link" data-tab="profile">Profile</div></a>
      <div class="side-link active" data-tab="posts">Posts</div>
    </aside>

    <div class="main-content">
      <!-- Composer section -->
      <div class="panel composer reveal is-visible">
        <h2>Create a Post</h2>
        <input id="postTitle" type="text" placeholder="Title of your finding...">
        <textarea id="postBody" rows="5" placeholder="Share your energy analytics or causal discoveries..."></textarea>
        <select id="postVisibility">
          <option value="public">Public</option>
          <option value="friends">Friends</option>
          <option value="private">Private</option>
        </select>
        <button class="btn btn-primary" id="publishPost">
          Publish Post
        </button>
      </div>

      <!-- Search and Posts listing section -->
      <div class="panel search-panel reveal is-visible">
        <input id="searchPosts" type="text" placeholder="Search posts by title or content...">
      </div>

      <section class="reveal is-visible">
        <div id="postsList">
          <!-- Posts loaded dynamically -->
        </div>
      </section>
    </div>
  </div>
</main>

<div id="site-footer"></div>

<script src="shared/api.js"></script>
<script src="shared/app.js"></script>
<script src="shared/posts.js"></script>
</body>
</html>
